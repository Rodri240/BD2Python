<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket World Cup 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .nav-brand {
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .btn-acceder {
      background: #fff;
      color: #0f0f0f;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 28px;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn-acceder:hover { opacity: 0.85; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px 32px;
      gap: 48px;
    }

    .img-wrap {
      flex: 0 0 auto;
      width: 700px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      flex: 1;
      max-width: 400px;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .description {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 6px 14px;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">Ticketing World Cup</span>
    <a href="{{ url_for('login') }}" class="btn-acceder">Acceder</a>
  </nav>

  <main>
    <div class="img-wrap">
      <img src="{{ url_for('static', filename='foto_portada.png') }}" alt="FIFA World Cup 2026" />
    </div>

    <div class="content">
      <p class="eyebrow">Acceso al sistema</p>
      <h1>Iniciá sesión para entrar a la DEMO</h1>
      <p class="description">
        El acceso queda guardado en la sesión del navegador para mantenerte autenticado mientras navegás por las páginas del sistema.
      </p>
      <div class="badges">
        <span class="badge">🔒 Sesión persistente</span>
        <span class="badge">🛡️ Páginas protegidas</span>
        <span class="badge">⚽ Login real contra la base</span>
      </div>
    </div>
  </main>

</body>
</html>
